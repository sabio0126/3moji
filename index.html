<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>惨文字</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f3ecdd;
    --paper-dark: #e8dec8;
    --ink: #2b2723;
    --ink-soft: #5a5248;
    --hanko: #b8332a;
    --hanko-deep: #7d2019;
    --gold: #b6912f;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0;
    min-height:100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Shippori Mincho', serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 30px 12px;
    overflow-x:hidden; /* 幽霊文字の横はみ出しのみ非表示 */
  }

  /* ── 演出: 背景グラデ ── */
  .bg-fx{
    position:fixed; inset:-10%; z-index:0;
    pointer-events:none; opacity:0;
    background: conic-gradient(from 0deg,rgba(184,51,42,.4),rgba(182,145,47,.3),rgba(184,51,42,0),rgba(182,145,47,.3),rgba(184,51,42,.4));
    filter:blur(50px);
    transition: opacity 0.25s ease;
  }
  .bg-fx.active{
    opacity:1;
    animation: bgSpin 1.1s linear infinite, bgPulse 0.35s ease-in-out infinite alternate;
  }
  @keyframes bgSpin{ from{transform:rotate(0deg) scale(1.5)} to{transform:rotate(360deg) scale(1.5)} }
  @keyframes bgPulse{
    from{filter:blur(50px) brightness(1)}
    to{filter:blur(70px) brightness(1.3)}
  }

  /* ── 演出: リーチ時の巨大幽霊文字（上下） ── */
  .reach-ghost{
    position:fixed;
    font-family:'Yuji Syuku',serif;
    font-size: 80vw; /* 一部しか見えないくらい大きく */
    line-height:1;
    color: var(--hanko);
    opacity:0;
    pointer-events:none;
    z-index:0;
    left:50%;
    transform:translateX(-50%);
    user-select:none;
    transition: opacity 0.35s ease;
    text-shadow: 0 0 60px rgba(184,51,42,0.25);
  }
  #reachGhost1{ top:-15vw; }    /* 上からはみ出す */
  #reachGhost2{ bottom:-15vw; } /* 下からはみ出す */
  .reach-ghost.show{ opacity:0.08; }

  /* ── 演出: ホワイトアウト ── */
  .white-out{
    position:fixed; inset:0;
    background:#fff; opacity:0;
    pointer-events:none; z-index:50;
  }

  /* ── フレーム ── */
  .frame{
    width:min(92vw,440px);
    padding:36px 28px 30px;
    border:1px solid rgba(43,39,35,.35);
    position:relative;
    background:rgba(243,236,221,.92);
    /* z-index外すことでスタッキングコンテキストを作らない→controls z-index:60がwhite-out z-index:50に勝てる */
  }
  .frame::before,.frame::after{
    content:""; position:absolute;
    width:14px; height:14px;
    border:1px solid rgba(43,39,35,.35);
  }
  .frame::before{top:-7px;left:-7px;border-right:none;border-bottom:none;}
  .frame::after{bottom:-7px;right:-7px;border-left:none;border-top:none;}

  .eyebrow{
    text-align:center; font-size:12px;
    letter-spacing:.35em; color:var(--ink-soft); margin:0 0 6px;
  }
  h1{
    text-align:center; font-size:24px; font-weight:600;
    letter-spacing:.18em; margin:0 0 28px;
    color:var(--ink); text-shadow:1.5px 1.5px 0 rgba(184,51,42,.35);
  }

  .stage-wrap{ position:relative; margin-bottom:26px; }

  /* リーチバナー */
  .reach-banner{
    position:absolute; left:50%; top:-34px;
    transform:translateX(-50%) scale(.8);
    font-family:'Yuji Syuku',serif; font-size:22px;
    letter-spacing:.3em; color:var(--hanko);
    opacity:0; pointer-events:none;
    transition:opacity .2s ease,transform .2s ease;
  }
  .reach-banner.show{
    opacity:1; transform:translateX(-50%) scale(1);
    animation:reachPulse .5s ease-in-out infinite alternate;
  }
  @keyframes reachPulse{
    from{text-shadow:0 0 4px rgba(184,51,42,.2)}
    to{text-shadow:0 0 16px rgba(184,51,42,.7)}
  }

  /* ステージ */
  .stage{
    position:relative; display:flex;
    justify-content:center; gap:16px;
    min-height:160px; align-items:center;
  }
  .stage.drumroll{ animation:stageShake .12s linear infinite; }
  @keyframes stageShake{
    0%{transform:translate(0,0)} 25%{transform:translate(1px,-1px)}
    50%{transform:translate(-1px,1px)} 75%{transform:translate(1px,1px)}
    100%{transform:translate(-1px,-1px)}
  }

  /* タイル */
  .tile{
    width:84px; height:110px;
    border:1px solid rgba(43,39,35,.5);
    background:linear-gradient(180deg,#fbf8f0,var(--paper-dark));
    display:flex; align-items:center; justify-content:center;
    position:relative; box-shadow:2px 3px 0 rgba(43,39,35,.08);
    overflow:visible;
  }
  .tile.locked{ border-color:var(--hanko); box-shadow:2px 3px 0 rgba(184,51,42,.18); }
  .tile.locked::after{
    content:"固"; position:absolute; top:3px; left:5px;
    font-size:10px; color:var(--hanko);
  }
  .tile span{
    font-family:'Yuji Syuku',serif;
    font-size:56px; line-height:1; color:var(--ink);
    display:block;
  }
  .tile.placeholder span{ opacity:.18; font-size:30px; }
  .tile.spinning span{ filter:blur(.6px); opacity:.85; }
  .tile.spinning.reach-final span{ color:var(--hanko); }
  .tile.stopped span{
    animation:reelStop .4s cubic-bezier(.2,.9,.3,1.2) forwards;
  }
  @keyframes reelStop{
    0%{opacity:.6;transform:scale(1.25);filter:blur(2px)}
    60%{opacity:1;transform:scale(.93);filter:blur(0)}
    100%{opacity:1;transform:scale(1);filter:blur(0)}
  }

  /* 3文字目スペシャル: 中央に飛び出して大きく */
  .tile.special-zoom span{
    animation:specialZoom .75s cubic-bezier(.15,.9,.2,1.3) forwards;
  }
  @keyframes specialZoom{
    0%{transform:translate(0,0) scale(1);color:var(--ink)}
    40%{transform:translate(var(--zoom-dx,0px),var(--zoom-dy,0px)) scale(9.6);color:var(--hanko);text-shadow:0 0 30px rgba(184,51,42,.7)}
    100%{transform:translate(0,0) scale(1);color:var(--ink);text-shadow:none}
  }

  /* ボタン */
  .controls{
    display:flex; justify-content:center;
    position:relative; z-index:60;
  }
  button#drawBtn{
    font-family:'Shippori Mincho',serif;
    font-size:15px; letter-spacing:.3em;
    padding:14px 36px;
    background:var(--hanko); color:#f3ecdd;
    border:none; cursor:pointer;
    transition:transform .15s ease,box-shadow .15s ease,filter .15s ease;
    box-shadow:0 3px 0 var(--hanko-deep);
  }
  button#drawBtn:hover:not(:disabled){ filter:brightness(1.05); }
  button#drawBtn:active:not(:disabled){ transform:translateY(3px);box-shadow:0 0 0 var(--hanko-deep); }
  button#drawBtn:disabled{ filter:grayscale(.3) brightness(.95); cursor:default; }
  button#drawBtn:focus-visible{ outline:2px solid var(--gold);outline-offset:3px; }

  .footnote{
    text-align:center; margin-top:18px;
    font-size:12px; color:var(--ink-soft);
    letter-spacing:.15em; min-height:16px;
  }

  /* 詳細設定 */
  .settings-toggle{
    display:block; margin:22px auto 0;
    background:none; border:none;
    font-family:'Shippori Mincho',serif;
    font-size:11px; letter-spacing:.2em;
    color:var(--ink-soft); cursor:pointer;
    text-decoration:underline; text-underline-offset:3px;
  }
  .settings-toggle:hover{ color:var(--ink); }
  .settings-panel{ margin-top:16px; padding-top:16px; border-top:1px dashed rgba(43,39,35,.3); }
  .settings-panel[hidden]{ display:none; }
  .toggle-row{
    display:flex; align-items:center; gap:6px;
    font-size:12px; margin-bottom:10px;
    letter-spacing:.05em; color:var(--ink-soft);
  }
  .lock-row{
    display:flex; align-items:center; gap:8px;
    font-size:12px; margin-bottom:8px; letter-spacing:.05em;
  }
  .lock-row label.pos-label{ width:64px; flex-shrink:0; color:var(--ink-soft); }
  select{
    font-family:'Shippori Mincho',serif; font-size:13px;
    padding:3px 6px; border:1px solid rgba(43,39,35,.4);
    background:#fbf8f0; color:var(--ink);
  }
  select:disabled{ opacity:.4; }
  .section-block{
    margin-top:14px; padding-top:12px;
    border-top:1px dashed rgba(43,39,35,.3); font-size:12px;
  }
  .section-block .title-line{
    color:var(--ink-soft); margin-bottom:8px;
    letter-spacing:.05em; display:flex; align-items:flex-start; gap:6px;
  }
  .section-block .sub-note{
    font-size:11px; color:var(--ink-soft); opacity:.85; margin:4px 0 8px;
  }
  .combo-row{
    display:flex; align-items:center; gap:6px;
    flex-wrap:wrap; margin-bottom:6px;
  }
  .combo-row .combo-del{
    background:none; border:1px solid rgba(184,51,42,.5);
    color:var(--hanko); font-size:11px; line-height:1;
    padding:3px 7px; cursor:pointer; font-family:'Shippori Mincho',serif;
  }
  .combo-row .combo-del:hover{ background:rgba(184,51,42,.08); }
  .add-btn{
    margin-top:4px; background:none;
    border:1px dashed rgba(43,39,35,.4);
    color:var(--ink-soft); font-size:12px;
    padding:5px 10px; cursor:pointer;
    font-family:'Shippori Mincho',serif; letter-spacing:.05em;
  }
  .add-btn:hover{ color:var(--ink); border-color:var(--ink); }
  input[type="checkbox"]{
    accent-color:var(--hanko); width:14px; height:14px;
    flex-shrink:0; margin-top:2px;
  }
  .credit{
    text-align:center;
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px dashed rgba(43,39,35,0.2);
    font-size: 10px;
    color: var(--ink-soft);
    opacity: 0.7;
    letter-spacing: 0.05em;
  }
  .credit a{
    color: var(--ink-soft);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  @keyframes btnFadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
  }
  .btn-fade-in{ animation: btnFadeIn 1.2s ease forwards !important; }
  .btn-hidden{ opacity:0 !important; }

  @media (prefers-reduced-motion:reduce){
    .tile.stopped span,.stage.drumroll,.bg-fx.active,
    .reach-banner.show,.tile.special-zoom span{ animation:none; }
    .bg-fx.active{ opacity:.5; }
  }
</style>
</head>
<body>
  <div class="bg-fx" id="bgFx"></div>
  <div class="reach-ghost" id="reachGhost1"></div>
  <div class="reach-ghost" id="reachGhost2"></div>
  <div class="white-out" id="whiteOut"></div>

  <div class="frame">
    <p class="eyebrow">RANDOM HIRAGANA SLOT</p>
    <h1>惨 文 字</h1>

    <div class="stage-wrap">
      <div class="reach-banner" id="reachBanner">リ ー チ</div>
      <div class="stage" id="stage">
        <div class="tile placeholder" data-pos="0"><span>・</span></div>
        <div class="tile placeholder" data-pos="1"><span>・</span></div>
        <div class="tile placeholder" data-pos="2"><span>・</span></div>
      </div>
    </div>

    <div class="controls">
      <button id="drawBtn">回 す</button>
    </div>

    <p class="footnote" id="footnote">ボタンを押すと左から順に止まります</p>

    <button class="settings-toggle" id="settingsToggle">詳細設定 ▾</button>

    <div class="settings-panel" id="settingsPanel" hidden>

      <label class="toggle-row"><input type="checkbox" id="muteChk"> 🔇 効果音を消音する</label>
      <label class="toggle-row"><input type="checkbox" id="maruChk"> 文字に「〇」を加える</label>

      <div class="lock-row">
        <label class="pos-label"><input type="checkbox" id="lockChk0"> 1文字目固定</label>
        <select id="lockSel0" disabled></select>
      </div>
      <div class="lock-row">
        <label class="pos-label"><input type="checkbox" id="lockChk1"> 2文字目固定</label>
        <select id="lockSel1" disabled></select>
      </div>
      <div class="lock-row">
        <label class="pos-label"><input type="checkbox" id="lockChk2"> 3文字目固定</label>
        <select id="lockSel2" disabled></select>
      </div>

      <div class="section-block">
        <label class="title-line"><input type="checkbox" id="cheerFileEnable"> 演出効果音を外部ファイルにする</label>
        <p class="sub-note">音声ファイル(mp3・wav・m4a・ogg等)を選ぶと内蔵合成音の代わりに再生されます。</p>
        <input type="file" id="cheerFileInput" accept=".mp3,.wav,.m4a,.aac,.ogg,.opus,.mp4,audio/mpeg,audio/wav,audio/mp4,audio/ogg,audio/aac">
      </div>

      <div class="section-block">
        <p class="title-line"><input type="checkbox" id="specialChk" checked> この1・2・3文字目が揃ったら光フェードアウト</p>
        <p class="sub-note">1・2文字目が一致した時点で演出(掛け声+背景)が入ります。3文字すべて揃うと画面が白く包まれます。</p>
        <div id="specialList"></div>
        <button type="button" id="specialAddBtn" class="add-btn">＋ 組み合わせを追加</button>
      </div>

    </div>

    <p class="credit">効果音：<a href="https://otologic.jp" target="_blank" rel="noopener">OtoLogic</a></p>

  </div>

<script>
  const HIRAGANA = [
    "あ","い","う","え","お","か","き","く","け","こ",
    "さ","し","す","せ","そ","た","ち","つ","て","と",
    "な","に","ぬ","ね","の","は","ひ","ふ","へ","ほ",
    "ま","み","む","め","も","や","ゆ","よ",
    "ら","り","る","れ","ろ","わ","を","ん",
    "が","ぎ","ぐ","げ","ご","ざ","じ","ず","ぜ","ぞ",
    "だ","ぢ","づ","で","ど","ば","び","ぶ","べ","ぼ",
    "ぱ","ぴ","ぷ","ぺ","ぽ"
  ];
  const MARU = "〇";
  const HIRAGANA_WITH_MARU = HIRAGANA.concat([MARU]);

  const stage       = document.getElementById('stage');
  const drawBtn     = document.getElementById('drawBtn');
  const footnote    = document.getElementById('footnote');
  const reachBanner = document.getElementById('reachBanner');
  const bgFx        = document.getElementById('bgFx');
  const ghost1      = document.getElementById('reachGhost1');
  const ghost2      = document.getElementById('reachGhost2');
  const whiteOut    = document.getElementById('whiteOut');
  const tiles       = [...stage.querySelectorAll('.tile')];

  const settingsToggle = document.getElementById('settingsToggle');
  const settingsPanel  = document.getElementById('settingsPanel');
  const muteChk        = document.getElementById('muteChk');
  const maruChk        = document.getElementById('maruChk');
  const lockChks       = [0,1,2].map(i => document.getElementById('lockChk' + i));
  const lockSels       = [0,1,2].map(i => document.getElementById('lockSel' + i));
  const cheerFileEnable= document.getElementById('cheerFileEnable');
  const cheerFileInput = document.getElementById('cheerFileInput');
  const specialChk     = document.getElementById('specialChk');
  const specialList    = document.getElementById('specialList');
  const specialAddBtn  = document.getElementById('specialAddBtn');

  function fillSelect(sel){
    HIRAGANA_WITH_MARU.forEach(c => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = c;
      sel.appendChild(opt);
    });
  }
  lockSels.forEach(fillSelect);

  lockChks.forEach((chk, i) => {
    chk.addEventListener('change', () => {
      lockSels[i].disabled = !chk.checked;
      tiles[i].classList.toggle('locked', chk.checked);
    });
  });

  settingsToggle.addEventListener('click', () => {
    const h = settingsPanel.hasAttribute('hidden');
    h ? settingsPanel.removeAttribute('hidden') : settingsPanel.setAttribute('hidden','');
    settingsToggle.textContent = h ? '詳細設定 ▴' : '詳細設定 ▾';
  });

  function addSpecialRow(c1, c2, c3){
    const row = document.createElement('div');
    row.className = 'combo-row';
    const mk = t => { const s=document.createElement('span'); s.textContent=t; return s; };
    const sel1=document.createElement('select'); fillSelect(sel1); if(c1) sel1.value=c1;
    const sel2=document.createElement('select'); fillSelect(sel2); if(c2) sel2.value=c2;
    const sel3=document.createElement('select'); fillSelect(sel3); if(c3) sel3.value=c3;
    const del=document.createElement('button');
    del.type='button'; del.className='combo-del'; del.textContent='削除';
    del.addEventListener('click', () => row.remove());
    row.append(mk('1文字目='),sel1,mk('2文字目='),sel2,mk('3文字目='),sel3,del);
    row._sel1=sel1; row._sel2=sel2; row._sel3=sel3;
    specialList.appendChild(row);
  }
  specialAddBtn.addEventListener('click', () => addSpecialRow());
  addSpecialRow();

  function randomChar(){
    const pool = maruChk.checked ? HIRAGANA_WITH_MARU : HIRAGANA;
    return pool[Math.floor(Math.random()*pool.length)];
  }

  function startSpinVisual(tile){
    tile.classList.remove('placeholder','stopped','special-zoom');
    tile.classList.add('spinning');
    const span = tile.querySelector('span');
    return setInterval(() => { span.textContent = randomChar(); }, 45);
  }

  function stopSpinVisual(tile, intervalId, finalChar){
    clearInterval(intervalId);
    tile.querySelector('span').textContent = finalChar;
    tile.classList.remove('spinning','reach-final');
    tile.classList.add('stopped');
    void tile.offsetWidth;
    tile.classList.remove('stopped');
    tile.classList.add('stopped');
  }

  let whiteOutBtnTimer = null;

  function showWhiteOut(){
    whiteOut.style.transition='opacity 5s linear';
    void whiteOut.offsetWidth;
    whiteOut.style.opacity='1';
    // ボタンも同時に5秒でフェードアウト
    drawBtn.style.transition='opacity 5s linear';
    void drawBtn.offsetWidth;
    drawBtn.style.opacity='0';
    // 5.1秒後にフェードイン
    if(whiteOutBtnTimer) clearTimeout(whiteOutBtnTimer);
    whiteOutBtnTimer = setTimeout(()=>{
      drawBtn.style.transition='opacity 1.2s ease';
      void drawBtn.offsetWidth;
      drawBtn.style.opacity='1';
      whiteOutBtnTimer = null;
    }, 5100);
  }
  function hideWhiteOut(){
    if(whiteOutBtnTimer){ clearTimeout(whiteOutBtnTimer); whiteOutBtnTimer=null; }
    whiteOut.style.transition='opacity 0.3s ease';
    whiteOut.style.opacity='0';
    drawBtn.style.transition='none';
    drawBtn.style.opacity='1';
  }

  /* ========== AUDIO ========== */
  let audioCtx = null;
  function ensureAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    return audioCtx;
  }

  function makeNoiseBuffer(ctx, dur){
    const len = Math.max(1, Math.floor(ctx.sampleRate*dur));
    const buf = ctx.createBuffer(1,len,ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    return buf;
  }

  /* ── ドラムロール: 停止可能な設計 ── */
  let drumMasterGain = null;
  let drumNodes = [];

  function playDrumHit(ctx, time, peak, destNode){
    const src = ctx.createBufferSource();
    src.buffer = makeNoiseBuffer(ctx, 0.06);
    const bp = ctx.createBiquadFilter();
    bp.type='bandpass'; bp.frequency.value=260; bp.Q.value=0.9;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0,time);
    gain.gain.linearRampToValueAtTime(peak, time+0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, time+0.08);
    src.connect(bp).connect(gain).connect(destNode);
    src.start(time); src.stop(time+0.09);
    drumNodes.push(src);
  }

  function startDrumroll(durationMs){
    if(muteChk.checked || durationMs<=0) return;
    const ctx = ensureAudio();
    stopDrumrollNow(); // 前のを切る
    drumNodes = [];
    drumMasterGain = ctx.createGain();
    drumMasterGain.gain.setValueAtTime(1, ctx.currentTime);
    drumMasterGain.connect(ctx.destination);
    const now = ctx.currentTime;
    const total = durationMs/1000;
    const gap = 0.07;
    const hits = Math.max(1, Math.floor(total/gap));
    for(let i=0;i<hits;i++){
      playDrumHit(ctx, now+i*gap, 0.1+(i/hits)*0.2, drumMasterGain);
    }
  }

  function stopDrumrollNow(){
    if(!drumMasterGain) return;
    const ctx = ensureAudio();
    const now = ctx.currentTime;
    try{
      drumMasterGain.gain.cancelScheduledValues(now);
      drumMasterGain.gain.setValueAtTime(drumMasterGain.gain.value, now);
      drumMasterGain.gain.linearRampToValueAtTime(0, now+0.015); // 15ms でスパッと切る
    }catch(e){}
    drumMasterGain = null;
    drumNodes = [];
  }

  /* ── カッ: 太鼓のフチ打ち ── */
  function playRimShot(){
    if(muteChk.checked) return;
    const ctx = ensureAudio();
    const now = ctx.currentTime;

    // ハイ成分 (カチッ)
    const noise = ctx.createBufferSource();
    noise.buffer = makeNoiseBuffer(ctx, 0.04);
    const hp = ctx.createBiquadFilter();
    hp.type='highpass'; hp.frequency.value=4000;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.9,now);
    ng.gain.exponentialRampToValueAtTime(0.001, now+0.035);
    noise.connect(hp).connect(ng).connect(ctx.destination);
    noise.start(now); noise.stop(now+0.04);

    // ロー成分 (コン)
    const osc = ctx.createOscillator();
    osc.type='sine'; osc.frequency.setValueAtTime(500,now);
    osc.frequency.exponentialRampToValueAtTime(180, now+0.025);
    const og = ctx.createGain();
    og.gain.setValueAtTime(0.6,now);
    og.gain.exponentialRampToValueAtTime(0.001, now+0.03);
    osc.connect(og).connect(ctx.destination);
    osc.start(now); osc.stop(now+0.035);
  }

  /* ── うぉっ演出音 ── */
  function playCheerHit(ctx, time, peak){
    const osc = ctx.createOscillator();
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(190,time);
    osc.frequency.exponentialRampToValueAtTime(95,time+0.13);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0,time);
    gain.gain.linearRampToValueAtTime(peak,time+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001,time+0.2);
    osc.connect(gain).connect(ctx.destination);
    osc.start(time); osc.stop(time+0.22);

    const noise = ctx.createBufferSource();
    noise.buffer = makeNoiseBuffer(ctx,0.15);
    const hp = ctx.createBiquadFilter();
    hp.type='highpass'; hp.frequency.value=700;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0,time);
    ng.gain.linearRampToValueAtTime(peak*0.4,time+0.01);
    ng.gain.exponentialRampToValueAtTime(0.001,time+0.15);
    noise.connect(hp).connect(ng).connect(ctx.destination);
    noise.start(time); noise.stop(time+0.16);
  }

  function playSynthCheer(){
    const ctx = ensureAudio();
    const now = ctx.currentTime;
    for(let i=0;i<4;i++) playCheerHit(ctx, now+i*0.22, 0.22+i*0.045);
  }

  let applauseBuffer = null;

  let cheerAudioUrl = null;
  // base64 → ArrayBuffer
  function b64ToArrayBuffer(b64){
    const bin = atob(b64);
    const buf = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
    return buf.buffer;
  }

  // AudioContextでデコードしてバッファに保存
  async function decodeBuiltinCheer(){
    if(builtinCheerBuffer) return;
    try{
      const ctx = ensureAudio();
      builtinCheerBuffer = await ctx.decodeAudioData(b64ToArrayBuffer(BUILTIN_CHEER_B64));
    }catch(e){ console.warn('builtin cheer decode failed',e); }
  }

  // 外部ファイルを AudioContext でデコード（fetchでBlobURL読み込み）
  async function decodeApplause(){
    if(applauseBuffer) return;
    try{
      const ctx = ensureAudio();
      applauseBuffer = await ctx.decodeAudioData(b64ToArrayBuffer(APPLAUSE_B64));
    }catch(e){ console.warn('applause decode failed',e); }
  }

  async function decodeExternalCheer(url){
    try{
      const ctx = ensureAudio();
      const resp = await fetch(url);
      const ab = await resp.arrayBuffer();
      externalCheerBuffer = await ctx.decodeAudioData(ab);
    }catch(e){ console.warn('external cheer decode failed',e); }
  }

  function playAudioBuffer(buf){
    if(!buf) return false;
    try{
      const ctx = ensureAudio();
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);
      src.start();
      return true;
    }catch(e){ return false; }
  }

  // 拍手再生（6秒でフェードアウト）
  let applauseSrc = null;
  let applauseGain = null;
  function playApplause(){
    if(muteChk.checked || !applauseBuffer) return;
    stopApplause();
    const ctx = ensureAudio();
    applauseGain = ctx.createGain();
    applauseGain.gain.setValueAtTime(1, ctx.currentTime);
    applauseSrc = ctx.createBufferSource();
    applauseSrc.buffer = applauseBuffer;
    applauseSrc.connect(applauseGain).connect(ctx.destination);
    applauseSrc.start();
    // 6秒後から1秒かけてフェードアウト → 7秒で無音
    applauseGain.gain.setValueAtTime(1, ctx.currentTime + 6.0);
    applauseGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 7.0);
    applauseSrc.stop(ctx.currentTime + 7.1);
    applauseSrc.onended = () => { applauseSrc = null; applauseGain = null; };
  }
  function stopApplause(){
    if(applauseSrc){ try{ applauseSrc.stop(); }catch(e){} applauseSrc = null; }
    applauseGain = null;
  }

  cheerFileInput.addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    if(cheerAudioUrl) URL.revokeObjectURL(cheerAudioUrl);
    cheerAudioUrl = URL.createObjectURL(file);
    externalCheerBuffer = null;
    decodeExternalCheer(cheerAudioUrl);
  });

  function playCheer(){
    if(muteChk.checked) return;

  const STORAGE_KEY = 'sanmoji_settings_v1';

  function collectSettings(){
    return {
      mute: muteChk.checked,
      maru: maruChk.checked,
      cheerFileEnable: cheerFileEnable.checked,
      specialEnabled: specialChk.checked,

    };
  }

  function saveSettings(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(collectSettings())); }catch(e){}
  }

  function loadSettings(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const s = JSON.parse(raw);
      muteChk.checked = !!s.mute;
      maruChk.checked = !!s.maru;
      cheerFileEnable.checked = !!s.cheerFileEnable;
      specialChk.checked = s.specialEnabled !== false;
      (s.locks||[]).forEach((l,i) => {
        lockChks[i].checked = !!l.enabled;
        lockSels[i].disabled = !l.enabled;
        lockSels[i].value = l.value || HIRAGANA[0];
        tiles[i].classList.toggle('locked', !!l.enabled);
      });
      while(specialList.firstChild) specialList.removeChild(specialList.firstChild);
      const rows = s.specials && s.specials.length ? s.specials : [{}];
      rows.forEach(r => addSpecialRow(r.c1, r.c2, r.c3));

  }
